services:
  web:
    build: .
    ports:
      - "8006:8006"
    volumes:
      - ./backend:/app/backend
      - ./db:/app/db
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=day_forge.settings
      # Exercise the production-shaped shared cache path even in dev.
      # With LLM_API_KEY set, ai.E001 requires this; without it, the
      # LocMem fallback would refuse to boot once AI is enabled.
      - REDIS_URL=redis://redis:6379/0
    command: uv run python manage.py runserver 0.0.0.0:8006
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      # Exposed for local inspection (redis-cli); not required by the app.
      - "6379:6379"
