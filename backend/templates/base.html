{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="{{ initial_theme|default:'classic' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Forge</title>
    {% if vite_dev_mode %}
        <link rel="icon" type="image/png" sizes="48x48" href="http://localhost:5173/favicon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="http://localhost:5173/favicon-32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="http://localhost:5173/favicon-16.png">
        <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="http://localhost:5173/apple-touch-icon.png">
        <script type="module" src="http://localhost:5173/@vite/client"></script>
        <script type="module" src="http://localhost:5173/src/app.ts"></script>
    {% else %}
        <link rel="icon" type="image/png" sizes="48x48" href="{% static 'favicon.png' %}">
        <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon-32.png' %}">
        <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon-16.png' %}">
        <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="{% static 'apple-touch-icon.png' %}">
        <link rel="stylesheet" href="{% static 'assets/app.css' %}">
        <script type="module" src="{% static 'assets/app.js' %}"></script>
    {% endif %}
</head>
<body>
    {% block inertia %}{% endblock %}
</body>
</html>
