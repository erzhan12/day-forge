name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            ## Repository context (day-forge)

            Day Forge is an AI-powered daily schedule assistant. Use this stack map to
            ground your review in real code paths and risk areas:

            - **Backend** — Django 5, Python 3.14 (managed with `uv`). Async AI views live
              in `backend/ai/` (`views.py`, `service.py`, `prompts.py`). Production system
              checks `ai.E001` / `ai.E002` (`backend/ai/checks.py`) and
              `calendar_sync.E001` / `calendar_sync.W001` (`backend/calendar_sync/checks.py`)
              gate startup — never weaken them. Settings + middleware in
              `backend/day_forge/settings.py`. SQLite in dev, Redis cache in prod (holds the
              `ai_*_rl` rate-limit counters — only sync `incr` is atomic). CalDAV passwords
              are Fernet-encrypted at rest. Lint with `ruff`, test with `pytest`.
            - **Frontend** — Vue 3 + Inertia.js + TypeScript (Vite). Schedule/drag logic in
              `frontend/src/composables/useSchedule.ts` and `useDrag.ts` — these carry the
              drag/drop concurrency + mutation-abort guards, so scrutinize any change there
              for races and stale-state writes. Type safety is gated by `vue-tsc --noEmit`.
            - **Deploy** — production stack lives under `deployment/` (uvicorn ASGI + Caddy)
              and is distinct from the root dev `docker-compose.yml`. GHCR build/deploy is
              `.github/workflows/deploy.yml`; TLS relies on `SECURE_PROXY_SSL_HEADER` behind
              Caddy. Treat any change under `deployment/` or to `deploy.yml` as
              production-affecting and call it out explicitly.
            - **Conventions** — honor `CLAUDE.md`, `RULES.md`, and the
              `docs/features/*_PLAN.md` feature-plan pattern.

            Please perform a comprehensive code review with the following focus areas:

            1. **Code Quality**
               - Clean code principles and best practices
               - Proper error handling and edge cases
               - Code readability and maintainability

            2. **Security**
               - Check for potential security vulnerabilities
               - Validate input sanitization
               - Review authentication/authorization logic

            3. **Performance**
               - Identify potential performance bottlenecks
               - Review database queries for efficiency
               - Check for memory leaks or resource issues

            4. **Testing**
               - Verify adequate test coverage
               - Review test quality and edge cases
               - Check for missing test scenarios

            5. **Documentation**
               - Ensure code is properly documented
               - Verify README updates for new features
               - Check API documentation accuracy

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            ## Output Instructions

            1. Review all changed files in the PR thoroughly.
            2. Post exactly ONE top-level comment using `gh pr comment` containing ALL findings.
            3. Do NOT use `gh pr review` with inline comments.
            4. Do NOT post multiple comments. Everything must be in a SINGLE `gh pr comment`.

            ## Comment Format

            The comment must follow this exact structure:
            ```markdown
            ## Code Review Summary

            <2-3 sentence overall assessment>

            ## Actionable Fixes

            Copy everything below the line and pass it to Claude Code:

            ---

            In this repository, please make the following changes:

            1. **[P0] [SECURITY]** File `backend/ai/views.py`, line 42: <specific instruction>
            2. **[P0] [BUG]** File `frontend/src/composables/useDrag.ts`, line 87: <specific instruction>
            3. **[P1] [PERFORMANCE]** File `backend/day_forge/settings.py`, line 15: <specific instruction>
            4. **[P2] [QUALITY]** File `frontend/src/composables/useSchedule.ts`, line 33: <specific instruction>
            5. **[P2] [TESTING]** File `backend/tests/test_ai_views.py`: <specific instruction>
            6. **[P3] [DOCS]** File `RULES.md`: <specific instruction>

            After making all changes, run the existing tests to make sure nothing is broken.

            ## Merge Verdict

            **APPROVED** / **CHANGES REQUESTED**

            <1-2 sentence justification for the verdict>
            ```

            ## Priority Scale
            - P0 = Must fix before merge (security vulnerabilities, data loss bugs, broken functionality)
            - P1 = Should fix before merge (performance issues, significant code smells)
            - P2 = Fix recommended (quality improvements, missing tests, minor issues)
            - P3 = Nice to have (docs, style, minor suggestions)

            ## Merge Verdict Rules
            - **APPROVED**: No P0 issues found. P1/P2/P3 issues may exist but are not blockers.
            - **CHANGES REQUESTED**: Any P0 issue exists, or multiple P1 issues that together pose a significant risk.

            ## Rules
            - Everything in ONE `gh pr comment` call, no inline comments
            - Use exact file paths relative to repo root with line numbers from the diff
            - Each fix must be a specific actionable instruction, not vague advice
            - Use category tags: [SECURITY], [BUG], [PERFORMANCE], [QUALITY], [TESTING], [DOCS]
            - Prefix each fix with priority: [P0], [P1], [P2], or [P3]
            - Order by priority: P0 > P1 > P2 > P3
            - Skip praise or observations that require no code changes
            - If no fixes needed, say "No actionable fixes required"
            - Always end with a Merge Verdict section

          claude_args: |
            --model claude-sonnet-4-6
            --allowed-tools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
